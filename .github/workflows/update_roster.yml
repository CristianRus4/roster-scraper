name: Update Roster

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-roster:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      PUBLIC_ROSTER_URL: ${{ secrets.PUBLIC_ROSTER_URL || vars.PUBLIC_ROSTER_URL }}
      ROSTER_EMPLOYEE_NAME: Cristian Rus
      ROSTER_WEEKS_AHEAD: '4'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate roster calendar
        run: python scraper.py

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain roster.ics roster_summary.txt public/roster.ics public/index.html public/.nojekyll) ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add roster.ics roster_summary.txt public/roster.ics public/index.html public/.nojekyll
          git commit -m "Update roster feed for $(date +'%Y-%m-%d')"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
